<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat to JSON Converter</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f9f9f9; }
        h2, h3 { color: #333; }
        
        /* Secure API Key Box Styles */
        .settings-box { background: #e9ecef; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ccc; }
        input[type="password"] { width: calc(100% - 100px); padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .save-btn { background-color: #333; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .save-btn:hover { background-color: #555; }

        textarea { width: 100%; height: 250px; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; box-sizing: border-box; }
        
        .convert-btn { background-color: #0b57d0; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; margin-bottom: 20px; width: 100%; }
        .convert-btn:hover { background-color: #0842a0; }
        
        .output-container { position: relative; margin-top: 10px; }
        pre { background-color: #1e1e1e; color: #d4d4d4; padding: 35px 15px 15px 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; min-height: 50px; margin: 0; }
        
        .copy-btn { position: absolute; top: 10px; right: 10px; background-color: #444; color: white; border: none; padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .copy-btn:hover { background-color: #666; }
        .copy-btn.copied { background-color: #137333; } 
    </style>
</head>
<body>

    <h2>Google Chat to JSON Converter</h2>
    
    <div class="settings-box">
        <label for="apiKeyInput"><strong>Gemini API Key:</strong></label><br>
        <div style="display: flex; margin-top: 5px;">
            <input type="password" id="apiKeyInput" placeholder="Paste your API key here...">
            <button class="save-btn" onclick="saveKey()">Save Key</button>
        </div>
        <small style="color: #666; margin-top: 5px; display: block;">This key is saved securely in your browser's local storage. It is never uploaded to GitHub or any public server.</small>
    </div>

    <p>Paste the chat thread below (including replies) and click convert.</p>
    
    <textarea id="chatInput" placeholder="Paste your copied Google Chat text here..."></textarea>
    <br>
    <button class="convert-btn" onclick="convertText()">Convert to JSON</button>

    <h3>Output:</h3>
    <div class="output-container">
        <button class="copy-btn" id="copyBtn" onclick="copyJSON()">Copy</button>
        <pre id="jsonOutput">Your formatted JSON will appear here...</pre>
    </div>

    <script>
        // Auto-load saved key when the page opens
        window.onload = function() {
            const savedKey = localStorage.getItem("geminiApiKey");
            if (savedKey) document.getElementById("apiKeyInput").value = savedKey;
        };

        // Save the key to local browser storage securely
        function saveKey() {
            const key = document.getElementById("apiKeyInput").value.trim();
            if (key) {
                localStorage.setItem("geminiApiKey", key);
                alert("API Key saved securely to your browser!");
            }
        }

        async function convertText() {
            const rawText = document.getElementById("chatInput").value;
            const outputBox = document.getElementById("jsonOutput");
            const apiKey = document.getElementById("apiKeyInput").value.trim();
            
            if (!apiKey) {
                alert("Please enter and save your Gemini API Key at the top of the page first.");
                return;
            }

            if (!rawText.trim()) {
                outputBox.innerText = "Please paste some chat text first.";
                return;
            }

            outputBox.innerText = "Processing with AI... please wait.";

            const systemPrompt = `
            You are a strict data extraction assistant. Extract data from the following chat log into a JSON array.
            
            CRITICAL RULES:
            1. 'gridId' must ONLY be strings of numbers that begin with "28". Ignore all other number strings completely.
            2. If a thread contains multiple valid gridIds, create a separate JSON object for EACH one.
            3. Carefully match the correct information (Name, DOB, Alias, Deceased dates, GEO) to the correct gridId based on the text layout. Combine the details for each gridId into its own "info" string.
            4. Extract URLs into "link1", "link2", and "link3". If there are fewer than 3 links, make the remaining ones empty strings "". Ensure the links are matched to the correct gridId.
            5. Return ONLY a valid JSON array. Do not include markdown formatting or explanations.
            
            CHAT LOG:
            ${rawText}
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    outputBox.innerText = "API Error: " + data.error.message;
                    return;
                }

                let resultText = data.candidates[0].content.parts[0].text;
                
                // Clean up any markdown code block formatting the AI might add
                resultText = resultText.replace(/```json/g, "").replace(/```/g, "").trim();
                
                // Parse and nicely format the JSON
                const parsedJson = JSON.parse(resultText);
                outputBox.innerText = JSON.stringify(parsedJson, null, 2);

            } catch (error) {
                outputBox.innerText = "An error occurred: " + error.message;
            }
        }

        function copyJSON() {
            const outputText = document.getElementById("jsonOutput").innerText;
            const copyBtn = document.getElementById("copyBtn");
            
            if (outputText.includes("Processing with AI...") || outputText.includes("Your formatted JSON will appear here")) {
                return;
            }

            navigator.clipboard.writeText(outputText).then(() => {
                copyBtn.innerText = "Copied!";
                copyBtn.classList.add("copied");
                
                setTimeout(() => {
                    copyBtn.innerText = "Copy";
                    copyBtn.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert("Failed to copy text: " + err);
            });
        }
    </script>
</body>
</html>
